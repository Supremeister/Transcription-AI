name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            electron/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache CPU venv
        uses: actions/cache@v4
        with:
          path: venv_cpu_build
          key: cpu-venv-${{ runner.os }}-py311-${{ hashFiles('whisper_service_cpu.spec') }}

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Build frontend
        run: |
          npm install
          npm run build
        working-directory: frontend

      - name: Install electron deps
        run: npm install
        working-directory: electron

      - name: Copy node.exe
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Path
          Copy-Item $nodePath "electron\resources\node.exe" -Force
          Write-Host "Copied node.exe from $nodePath"

      - name: Build CPU whisper_service venv
        shell: pwsh
        run: |
          if (-not (Test-Path "venv_cpu_build\Scripts\pyinstaller.exe")) {
            Write-Host "Creating CPU venv..."
            python -m venv venv_cpu_build
            .\venv_cpu_build\Scripts\pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --quiet
            .\venv_cpu_build\Scripts\pip install faster-whisper flask flask-cors tqdm pyinstaller --quiet
            .\venv_cpu_build\Scripts\pip install pyannote.audio --quiet
          } else {
            Write-Host "CPU venv already cached."
          }

      - name: Build whisper_service exe (CPU-only)
        run: .\venv_cpu_build\Scripts\pyinstaller whisper_service_cpu.spec --noconfirm --distpath dist_cpu

      - name: Copy whisper_service to dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\whisper_service | Out-Null
          Copy-Item -Recurse -Force dist_cpu\whisper_service\* dist\whisper_service\

      - name: Inject HF_TOKEN into .env
        shell: pwsh
        run: |
          (Get-Content backend\.env) -replace '^HF_TOKEN=.*', "HF_TOKEN=${{ secrets.HF_TOKEN }}" | Set-Content backend\.env

      - name: Sync version from git tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          npm version $version --no-git-tag-version --allow-same-version
        working-directory: electron

      - name: Install electron-updater
        run: npm install
        working-directory: electron

      - name: Build Electron installer and publish to Release
        run: npx electron-builder --win --x64 --publish always
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
